<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a122c" />
      <stop offset="100%" stop-color="#030912" />
    </radialGradient>
    
    <!-- Neon Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <!-- Neon Violet Gradient -->
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Hexagonal Base -->
  <polygon points="256,20 456,135 456,377 256,492 56,377 56,135" fill="url(#bgGrad)" stroke="url(#violetGrad)" stroke-width="12" filter="url(#neonGlow)" />

  <!-- Stadium Outer Ring -->
  <path d="M 256 80 A 176 176 0 1 1 255.9 80" fill="none" stroke="url(#cyanGrad)" stroke-width="8" stroke-dasharray="24 16" opacity="0.8" />
  
  <!-- Stadium Inner Ring -->
  <path d="M 256 120 A 136 136 0 1 1 255.9 120" fill="none" stroke="url(#violetGrad)" stroke-width="4" stroke-dasharray="12 12" opacity="0.6" />

  <!-- Shield + AI Node in the center -->
  <g filter="url(#neonGlow)">
    <!-- Central Shield -->
    <path d="M 256 180 L 336 210 V 300 C 336 350 256 390 256 390 C 256 390 176 350 176 300 V 210 Z" fill="none" stroke="url(#cyanGrad)" stroke-width="10" stroke-linejoin="round" />
    
    <!-- AI Core Node -->
    <circle cx="256" cy="280" r="28" fill="url(#cyanGrad)" />
    
    <!-- Circuit lines radiating outward -->
    <path d="M 256 252 L 256 210" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" />
    <path d="M 256 308 L 256 350" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" />
    <path d="M 228 280 L 190 280" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" />
    <path d="M 284 280 L 322 280" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" />
    
    <!-- Nodes at ends -->
    <circle cx="256" cy="210" r="8" fill="#ffffff" />
    <circle cx="256" cy="350" r="8" fill="#ffffff" />
    <circle cx="190" cy="280" r="8" fill="#ffffff" />
    <circle cx="322" cy="280" r="8" fill="#ffffff" />
  </g>
</svg>
